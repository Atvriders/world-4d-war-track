version: '3.8'
services:
  app:
    build: .
    image: ghcr.io/atvriders/world-4d-war-track:latest
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
