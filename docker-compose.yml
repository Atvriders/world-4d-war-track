version: '3.8'
services:
  app:
    image: ghcr.io/atvriders/world-4d-war-track:latest
    ports:
      - "3006:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AISHUB_USERNAME=        # Get free account at https://www.aishub.net/
      - OPENSKY_CLIENT_ID=        # Create API client at https://opensky-network.org
      - OPENSKY_CLIENT_SECRET=
      - AISSTREAM_API_KEY=      # Optional: free key from https://aisstream.io/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
